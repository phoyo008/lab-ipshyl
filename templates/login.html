<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IPS H&L Salud</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <img src="{{ url_for('static', filename='logo.png') }}" alt="IPS H&L Salud" class="logo">
            <h1>Lab Results Delivery</h1>
            <p>IPS H&L Salud</p>
        </header>

        <main>
            <div class="login-box">
                <h2>Sign in</h2>
                <p class="login-subtitle">Enter your credentials to continue</p>

                {% if error %}
                <div class="login-error">{{ error }}</div>
                {% endif %}

                <form method="POST" action="/login">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username"
                               placeholder="Username" autocomplete="username" required autofocus>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password"
                               placeholder="Password" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn-submit">Sign in</button>
                </form>
            </div>
        </main>

        <footer>
            <p>&copy; 2025 IPS H&L Salud - Lab Results Automation</p>
        </footer>
    </div>
</body>
</html>
