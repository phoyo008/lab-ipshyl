<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso — IPS H&L Salud</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <img src="{{ url_for('static', filename='logo.png') }}" alt="IPS H&L Salud" class="logo">
            <h1>Envío de Resultados de Laboratorio</h1>
            <p>IPS H&L Salud</p>
        </header>

        <main>
            <div class="login-box">
                <h2>Iniciar sesión</h2>
                <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

                {% if error %}
                <div class="login-error">{{ error }}</div>
                {% endif %}

                <form method="POST" action="/login">
                    <div class="input-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" name="username"
                               placeholder="Usuario" autocomplete="username" required autofocus>
                    </div>
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password"
                               placeholder="Contraseña" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn-submit">Ingresar</button>
                </form>
            </div>
        </main>

        <footer>
            <p>© 2025 IPS H&L Salud - Automatizador de Resultados</p>
        </footer>
    </div>
</body>
</html>
