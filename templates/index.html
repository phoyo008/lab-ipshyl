<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Results Delivery - IPS H&L Salud</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <img src="{{ url_for('static', filename='logo.png') }}" alt="IPS H&L Salud" class="logo">
            <h1>Lab Results Delivery</h1>
            <p>IPS H&L Salud</p>
            <a href="/logout" class="btn-logout">Log out</a>
        </header>

        <main>
            <!-- Connection status panel -->
            <div class="connection-panel">
                <div class="connection-header">
                    <span>Connection status</span>
                    <button class="btn-test" id="testBtn" onclick="testConnection()">Test</button>
                </div>
                <div id="connectionStatus" class="connection-status">
                    <span class="status-dot neutral"></span>
                    <span id="statusText">Not verified</span>
                </div>
                <div id="connectionDetails" class="connection-details hidden"></div>
            </div>

            <!-- STEP 1: Upload form -->
            <div class="upload-section" id="uploadSection">
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="input-group">
                        <label for="pdfFile">Select one or more PDFs:</label>
                        <input type="file" id="pdfFile" name="file" accept=".pdf" multiple required>
                        <small>You can select multiple PDF files at once (max 16 MB each)</small>
                    </div>
                    <button type="submit" class="btn-submit" id="submitBtn">
                        Review result
                    </button>
                </form>
                <a href="/reportes" class="btn-reportes">View delivery report</a>
            </div>

            <!-- Loading spinner -->
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p id="loadingText">Processing...</p>
            </div>

            <!-- STEP 2: Preview before confirming (multiple PDFs) -->
            <div id="previewSection" class="hidden">
                <div class="preview-header">
                    <h2>Confirm deliveries</h2>
                    <p class="preview-subtitle" id="previewSubtitle">Verify the data before sending</p>
                </div>
                <div id="previewCards"></div>
                <div class="preview-global-actions">
                    <button class="btn-confirm" id="confirmAllBtn" onclick="confirmAll()">
                        Confirm and send all
                    </button>
                    <button class="btn-cancel" onclick="cancelAll()">
                        Cancel all
                    </button>
                </div>
            </div>

            <!-- STEP 3: Final results -->
            <div id="result" class="result hidden">
                <div id="resultContent"></div>
                <button class="btn-reset" onclick="resetForm()">Send more results</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2025 IPS H&L Salud - Lab Results Automation</p>
        </footer>
    </div>

    <script>
        const form           = document.getElementById('uploadForm');
        const fileInput      = document.getElementById('pdfFile');
        const loading        = document.getElementById('loading');
        const loadingText    = document.getElementById('loadingText');
        const result         = document.getElementById('result');
        const submitBtn      = document.getElementById('submitBtn');
        const uploadSection  = document.getElementById('uploadSection');
        const previewSection = document.getElementById('previewSection');
        const previewCards   = document.getElementById('previewCards');

        // List of pending deliveries: [{token, nombre, documento, email, referencia, fecha}]
        let pendingItems = [];

        // ---- Connection test ----
        async function testConnection() {
            const testBtn    = document.getElementById('testBtn');
            const statusText = document.getElementById('statusText');
            const statusDot  = document.querySelector('.status-dot');
            const details    = document.getElementById('connectionDetails');

            testBtn.disabled = true;
            testBtn.textContent = 'Testing...';
            statusText.textContent = 'Checking...';
            statusDot.className = 'status-dot neutral';
            details.classList.add('hidden');

            try {
                const res  = await fetch('/api/test-connection');
                const data = await res.json();

                details.innerHTML = '';
                details.classList.remove('hidden');

                const items = [
                    { key: 'google_sheets', label: 'Google Sheets' },
                    { key: 'email',         label: 'Email' }
                ];

                items.forEach(({ key, label }) => {
                    const r   = data.resultados[key];
                    const div = document.createElement('div');
                    div.className = 'conn-item';

                    const icon = document.createElement('span');
                    icon.textContent = r.ok ? 'OK' : 'FAIL';
                    icon.style.fontWeight = '700';
                    icon.style.color = r.ok ? '#16a34a' : '#dc2626';

                    const text = document.createElement('span');
                    text.className = 'conn-label';
                    text.textContent = label + ': ';

                    const msg = document.createElement('span');
                    msg.className = r.ok ? 'conn-ok' : 'conn-err';
                    msg.textContent = r.mensaje;

                    div.appendChild(icon);
                    div.appendChild(text);
                    div.appendChild(msg);
                    details.appendChild(div);
                });

                statusDot.className = data.ok ? 'status-dot ok' : 'status-dot error';
                statusText.textContent = data.ok ? 'All connected' : 'Connection errors detected';
            } catch (e) {
                statusDot.className = 'status-dot error';
                statusText.textContent = 'Could not connect to server';
            }

            testBtn.disabled = false;
            testBtn.textContent = 'Test';
        }

        // ---- STEP 1: Upload PDFs and get preview for each ----
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const files = fileInput.files;
            if (!files.length) {
                alert('Please select at least one PDF file');
                return;
            }

            pendingItems = [];
            const errors = [];

            submitBtn.disabled = true;
            uploadSection.classList.add('hidden');

            for (let i = 0; i < files.length; i++) {
                showLoading(`Processing file ${i + 1} of ${files.length}...`);

                const formData = new FormData();
                formData.append('file', files[i]);

                try {
                    const response = await fetch('/api/preview-pdf', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();

                    if (response.ok) {
                        pendingItems.push(data);
                    } else {
                        errors.push({ filename: files[i].name, ...data });
                    }
                } catch (err) {
                    errors.push({ filename: files[i].name, error: 'Connection error: ' + err.message });
                }
            }

            hideLoading();
            submitBtn.disabled = false;

            if (pendingItems.length > 0) {
                showPreview(errors);
            } else {
                showBatchResult([], errors);
            }
        });

        // ---- STEP 2: Show preview cards ----
        function showPreview(errors) {
            previewCards.innerHTML = '';

            pendingItems.forEach((item, idx) => {
                previewCards.appendChild(buildPreviewCard(item, idx));
            });

            errors.forEach(err => {
                previewCards.appendChild(buildErrorCard(err));
            });

            const total = pendingItems.length;
            document.getElementById('previewSubtitle').textContent =
                total === 1
                    ? 'Verify the data before sending the email'
                    : `${total} result(s) ready to send${errors.length ? `, ${errors.length} with errors` : ''}`;

            const confirmAllBtn = document.getElementById('confirmAllBtn');
            confirmAllBtn.textContent = total === 1
                ? 'Confirm and send'
                : `Confirm and send all (${total})`;

            uploadSection.classList.add('hidden');
            result.classList.add('hidden');
            previewSection.classList.remove('hidden');
        }

        function buildPreviewCard(item, idx) {
            const card = document.createElement('div');
            card.className = 'preview-box';
            card.dataset.idx = idx;

            card.innerHTML = '';

            const rows = [
                ['Patient',    item.nombre    || '—'],
                ['Document',   item.documento  || '—'],
                ['Reference',  item.referencia || '—'],
                ['Result date',item.fecha      || '—'],
            ];

            rows.forEach(([label, value]) => {
                const field = document.createElement('div');
                field.className = 'preview-field';
                const lbl = document.createElement('span');
                lbl.className = 'preview-label';
                lbl.textContent = label;
                const val = document.createElement('span');
                val.className = 'preview-value';
                val.textContent = value;
                field.appendChild(lbl);
                field.appendChild(val);
                card.appendChild(field);
            });

            const emailField = document.createElement('div');
            emailField.className = 'preview-field preview-email-field';
            const emailLabel = document.createElement('span');
            emailLabel.className = 'preview-label';
            emailLabel.textContent = 'Destination email';
            const emailVal = document.createElement('span');
            emailVal.className = 'preview-value preview-email';
            emailVal.textContent = item.email || '—';
            emailField.appendChild(emailLabel);
            emailField.appendChild(emailVal);
            card.appendChild(emailField);

            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'btn-cancel-single';
            cancelBtn.textContent = 'Remove this';
            cancelBtn.onclick = () => cancelOne(item.token, card);
            card.appendChild(cancelBtn);

            return card;
        }

        function buildErrorCard(err) {
            const card = document.createElement('div');
            card.className = 'preview-box preview-box-error';

            const title = document.createElement('p');
            title.className = 'error-card-title';
            title.textContent = 'Error: ' + (err.filename || 'File');
            card.appendChild(title);

            const msg = document.createElement('p');
            msg.className = 'error-card-msg';
            msg.textContent = err.error || 'Could not process';
            card.appendChild(msg);

            return card;
        }

        // ---- Remove a single PDF from the list ----
        async function cancelOne(token, cardEl) {
            fetch('/api/cancel-send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            }).catch(() => {});

            pendingItems = pendingItems.filter(i => i.token !== token);
            cardEl.remove();

            const total = pendingItems.length;
            if (total === 0) {
                resetForm();
                return;
            }

            document.getElementById('confirmAllBtn').textContent =
                total === 1 ? 'Confirm and send' : `Confirm and send all (${total})`;
            document.getElementById('previewSubtitle').textContent =
                total === 1 ? 'Verify the data before sending the email'
                            : `${total} result(s) ready to send`;
        }

        // ---- STEP 3: Confirm and send all ----
        async function confirmAll() {
            if (!pendingItems.length) return;

            const confirmAllBtn = document.getElementById('confirmAllBtn');
            confirmAllBtn.disabled = true;
            previewSection.classList.add('hidden');

            const successes = [];
            const errors    = [];

            for (let i = 0; i < pendingItems.length; i++) {
                showLoading(`Sending email ${i + 1} of ${pendingItems.length}...`);

                try {
                    const response = await fetch('/api/confirm-send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: pendingItems[i].token })
                    });
                    const data = await response.json();

                    if (response.ok) {
                        successes.push(data);
                    } else {
                        errors.push({ nombre: pendingItems[i].nombre, ...data });
                    }
                } catch (err) {
                    errors.push({ nombre: pendingItems[i].nombre, error: 'Connection error: ' + err.message });
                }
            }

            hideLoading();
            confirmAllBtn.disabled = false;
            pendingItems = [];
            showBatchResult(successes, errors);
        }

        // ---- Cancel all ----
        function cancelAll() {
            pendingItems.forEach(item => {
                fetch('/api/cancel-send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: item.token })
                }).catch(() => {});
            });
            pendingItems = [];
            resetForm();
        }

        // ---- Show final result (can be mixed successes + errors) ----
        function showBatchResult(successes, errors) {
            uploadSection.classList.add('hidden');
            previewSection.classList.add('hidden');
            result.classList.remove('hidden');

            const content = document.getElementById('resultContent');
            content.innerHTML = '';

            successes.forEach(data => {
                const box = document.createElement('div');
                box.className = 'success-box';
                box.style.marginBottom = '12px';

                const title = document.createElement('h2');
                title.textContent = 'Sent successfully';
                box.appendChild(title);

                [['Patient', data.nombre], ['Email', data.email], ['Document', data.documento]].forEach(([label, value]) => {
                    const p = document.createElement('p');
                    const s = document.createElement('strong');
                    s.textContent = label + ': ';
                    p.appendChild(s);
                    p.appendChild(document.createTextNode(value || ''));
                    box.appendChild(p);
                });

                content.appendChild(box);
            });

            errors.forEach(data => {
                const box = document.createElement('div');
                box.className = 'error-box';
                box.style.marginBottom = '12px';

                const title = document.createElement('h2');
                title.textContent = 'Error';
                box.appendChild(title);

                const msg = document.createElement('p');
                const s = document.createElement('strong');
                s.textContent = 'Message: ';
                msg.appendChild(s);
                msg.appendChild(document.createTextNode(data.error || ''));
                box.appendChild(msg);

                if (data.nombre) {
                    const p = document.createElement('p');
                    const s2 = document.createElement('strong');
                    s2.textContent = 'Patient: ';
                    p.appendChild(s2);
                    p.appendChild(document.createTextNode(data.nombre));
                    box.appendChild(p);
                }

                content.appendChild(box);
            });
        }

        // ---- UI helpers ----
        function showLoading(msg) {
            loadingText.textContent = msg || 'Processing...';
            loading.classList.remove('hidden');
        }

        function hideLoading() {
            loading.classList.add('hidden');
        }

        function resetForm() {
            form.reset();
            pendingItems = [];
            previewCards.innerHTML = '';
            previewSection.classList.add('hidden');
            result.classList.add('hidden');
            uploadSection.classList.remove('hidden');
            document.getElementById('confirmAllBtn').disabled = false;
            fileInput.focus();
        }
    </script>
</body>
</html>
